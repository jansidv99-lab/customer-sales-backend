# k8s/helm/backend/values.yaml

# ── Namespace ─────────────────────────────────────────────
namespace: customer-sales

# ── Image ─────────────────────────────────────────────────
image:
  repository: us-central1-docker.pkg.dev/waybackhome-mto0ibjp7iru8bkisr/customer-sales-repo/backend
  tag: latest
  pullPolicy: Always

# ── Replica count (free tier — keep at 1) ─────────────────
replicaCount: 4

# ── Service account ───────────────────────────────────────
serviceAccount:
  name: backend-sa
  # Workload Identity annotation — links to GCP SA
  gcpServiceAccount: gke-workload-sa@waybackhome-mto0ibjp7iru8bkisr.iam.gserviceaccount.com

# ── Application config ────────────────────────────────────
config:
  gcpProjectId: waybackhome-mto0ibjp7iru8bkisr
  bqDataset: customer_sales_db
  bqTable: customers

# ── Container ports ───────────────────────────────────────
service:
  type: ClusterIP      # Internal only — frontend talks to backend inside cluster
  port: 80
  targetPort: 8080

# ── Resource limits (free tier optimized) ─────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# ── Liveness and readiness probes ─────────────────────────
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10

# ── HPA (free tier — conservative) ───────────────────────
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2          # Max 2 on free tier — don't go higher
  cpuUtilization: 70