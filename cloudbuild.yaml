# cloudbuild.yaml — customer-sales-backend
steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:latest'
      - '.'

  # Step 2: Push commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:$COMMIT_SHA'

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:latest'

  # Step 4 + 5 combined: auth to GKE + Helm deploy — all inside cloud-sdk
  # cloud-sdk already has gke-gcloud-auth-plugin built in
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        # Install Helm
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

        # Authenticate to GKE cluster
        gcloud container clusters get-credentials customer-sales-cluster \
          --region=us-central1 \
          --project=$PROJECT_ID

        # Run Helm upgrade
        helm upgrade --install backend k8s/helm/backend \
          --namespace=customer-sales \
          --create-namespace \
          --set=image.tag=$COMMIT_SHA \
          --set=image.repository=us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend \
          --wait \
          --timeout=3m

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY