# cloudbuild.yaml — customer-sales-backend
steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:latest'
      - '.'

  # Step 2: Push commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:$COMMIT_SHA'

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:latest'

  # Step 4: Authenticate to GKE cluster — CRITICAL missing step
  # This writes kubeconfig so Helm can talk to the cluster in Step 5
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'customer-sales-cluster'
      - '--region=us-central1'
      - '--project=$PROJECT_ID'

  # Step 5: Helm upgrade — now runs with valid kubeconfig
  - name: 'alpine/helm:3.14.0'
    entrypoint: helm
    args:
      - 'upgrade'
      - '--install'
      - 'backend'
      - 'k8s/helm/backend'
      - '--namespace=customer-sales'
      - '--create-namespace'
      - '--set=image.tag=$COMMIT_SHA'
      - '--set=image.repository=us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend'
      - '--wait'
      - '--timeout=3m'
    # Mount the kubeconfig written by Step 4 into the Helm container
    volumes:
      - name: kubeconfig
        path: /root/.kube

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/customer-sales-repo/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY